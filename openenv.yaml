# EcoCode Environment Configuration
# OpenEnv-compatible metadata

name: ecocode
version: "1.0.0"
description: >
  Green Code Optimization Environment — an interactive environment where
  an AI agent receives inefficient Python code and iteratively refactors
  it to improve efficiency while preserving exact output correctness.

author: EcoCode Team
license: MIT

# Environment interface
interface:
  reset:
    description: Reset environment with a task
    endpoint: /reset
    method: POST
    request_schema:
      type: object
      properties:
        task_id:
          type: string
          description: Task identifier (optional, defaults to first task)
    response_schema:
      $ref: "#/schemas/Observation"

  step:
    description: Submit optimized code
    endpoint: /step
    method: POST
    request_schema:
      $ref: "#/schemas/Action"
    response_schema:
      type: object
      properties:
        observation:
          $ref: "#/schemas/Observation"
        reward:
          $ref: "#/schemas/Reward"
        done:
          type: boolean
        info:
          type: object
          properties:
            grader_result:
              $ref: "#/schemas/GraderResult"
            termination_reason:
              type: string
              description: Reason why the episode terminated (e.g., fatal_error, max_steps, success)

  state:
    description: Get current environment state
    endpoint: /state
    method: GET

# Schemas
schemas:
  Observation:
    type: object
    properties:
      current_code:
        type: string
        description: Current version of the code
      original_code:
        type: string
        description: Original inefficient code
      test_cases:
        type: array
        items:
          type: object
          properties:
            input:
              type: string
            expected_output:
              type: string
      difficulty:
        type: string
        enum: [easy, medium, hard]
      step_count:
        type: integer
    required:
      - current_code
      - original_code
      - test_cases
      - difficulty
      - step_count

  Action:
    type: object
    properties:
      rewritten_code:
        type: string
        description: Optimized version of the code
    required:
      - rewritten_code

  Reward:
    type: object
    description: Structured reward signal for a step
    properties:
      score:
        type: number
        description: Reward value for this step
      breakdown:
        type: object
        properties:
          correctness:
            type: number
          optimization:
            type: number
          penalty:
            type: number
          reason:
            type: string
      feedback:
        type: string
    required:
      - score

  GraderResult:
    type: object
    description: Structured grading output for a step
    properties:
      correctness_score:
        type: number
        description: "0.0 or 1.0 (binary correctness gate)"
      optimization_score:
        type: number
        description: "0.0-1.0 AST improvement score"
      penalty:
        type: number
        description: "Penalty for no improvement or invalid code"
      final_score:
        type: number
        description: "Combined score, clamped to 0.0-1.0"
      details:
        type: string
        description: "Human-readable grading explanation"
      time_optimized:
        type: number
        description: Relative improvement in execution time
      carbon_saved_grams:
        type: number
        description: Estimated carbon savings based on optimization
    required:
      - correctness_score
      - optimization_score
      - penalty
      - final_score

# Tasks
tasks:
  - id: loop_sum
    difficulty: easy
    description: Optimize loop-based sum using Python builtins
  - id: nested_search
    difficulty: medium
    description: Replace nested loop search with set operations
  - id: string_builder
    difficulty: medium
    description: Optimize string concatenation using str.join()
  - id: dictionary_frequency
    difficulty: medium
    description: Replace nested-loop frequency counting with dictionary
  - id: generator_vs_list
    difficulty: medium
    description: Use generator expression instead of list comprehension
  - id: combined_opts
    difficulty: hard
    description: Apply multiple combined optimizations
  - id: fibonacci_memoization
    difficulty: hard
    description: Use memoization for exponential recursive Fibonacci
  - id: loop_invariant_motion
    difficulty: hard
    description: Move constant computation outside loops

# Deployment
deployment:
  runtime: python3.11
  port: 7860
  dockerfile: Dockerfile
  compatible_with:
    - huggingface_spaces
